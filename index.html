
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Camera Greeting</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background-image:url("background.jpg"); 
    background-size:cover;
    background-position:center;
}

/* Greeting section */
#message{
    color:black;
    padding-top:40px;
}

h1{
    font-size:50px;
    letter-spacing:5px;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff4fa3;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff2c8a;
}

/* Camera section */
#cameraSection{
    display:none;
    margin-top:40px;
}

/* Camera frame */
.camera{
    position:relative;
    width:450px;
    margin:auto;
}

/* Camera image */
.camera img{
    width:100%;
}

/* Video inside camera screen */
.videoScreen{
    position:absolute;
    top:90px;
    left:90px;
    width:270px;
    height:200px;
}

.videoScreen video{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

<body>

<div id="message">

<h1>🎉 HAPPY BIRTHDAY 🎂</h1>
<p>Enjoy your day and wish you all the best! 🎈</p>

<button onclick="showCamera()">Open Birthday Camera 📷</button>

</div>


<div id="cameraSection">

<div class="camera">

<img src="background.jpg" alt="camera frame">

<div class="videoScreen">
<video controls autoplay>
<source src="bday great.mp4" type="video/mp4">
</video>
</div>

</div>

</div>


<script>

function showCamera(){
    document.getElementById("message").style.display="none";
    document.getElementById("cameraSection").style.display="block";
}

</script>

</body>
</html>
